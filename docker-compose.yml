services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: trader
      MYSQL_USER: trader
      MYSQL_PASSWORD: trader
      MYSQL_ROOT_PASSWORD: rootdevchange_me
    # Host port 3307 avoids conflict when another MySQL (or old container) already uses 3306 on Windows.
    # Inside the Compose network the API still uses mysql:3306.
    ports:
      - "3307:3306"
    volumes:
      - trader_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootdevchange_me"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.api
    ports:
      - "5232:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: MySQL
      Database__Host: mysql
      Database__Port: "3306"
      Database__Name: trader
      Database__Username: trader
      Database__Password: trader
      Jwt__Issuer: Trader
      Jwt__Audience: TraderClients
      Jwt__Key: CHANGE_ME_DOCKER_MIN_32_CHARS_LONG_SECRET!!
      Jwt__ExpiresHours: "12"
      # SPA in Docker (web) + optional local Vite dev
      Cors__Origins__0: http://localhost:8080
      Cors__Origins__1: http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser calls same-origin /api; nginx proxies to the api service.
        VITE_API_BASE_URL: ""
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  trader_mysql:
