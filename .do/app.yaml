# DigitalOcean App Platform — example spec (edit names, region, repo, sizes).
# Monorepo layout: API from backend/, static site from frontend/.
# Apply: doctl apps update <app-id> --spec .do/app.yaml
# Ingress: /api → .NET service with full path preserved; / → Vite static app.

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

name: trader
region: blr

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: trader
        preserve_path_prefix: true
    - match:
        path:
          prefix: /hubs
      component:
        name: trader
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: trader-web

services:
  - name: trader
    github:
      repo: PranjalAgrawal10/Trader
      branch: main
      deploy_on_push: true
    source_dir: backend
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    # Required RUN_TIME env vars (add in the DO UI or below; encrypt secrets):
    # DATABASE_URL=mysql://user:pass@host:25060/defaultdb?ssl-mode=Required  (from Managed MySQL → Connection details)
    # Jwt__Issuer, Jwt__Audience, Jwt__Key (≥32 chars), Cors__Origins__0, PublicWeb__FrontendBaseUrl
    # Email (registration, password reset, 2FA): Smtp__IsEnabled=true, Smtp__Host=smtp.gmail.com,
    # Smtp__Port=587, Smtp__EnableTls=true, Smtp__User, Smtp__Password (Gmail App password), Smtp__FromEmail
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        scope: RUN_TIME
        type: GENERAL
        value: Production
      - key: Database__Provider
        scope: RUN_TIME
        type: GENERAL
        value: MySQL
      # Set DATABASE_URL in the App Platform UI (Encrypt) — do not commit real credentials here.
      # If using an App Platform database resource named `db`, you can bind: value: ${db.DATABASE_URL}

static_sites:
  - name: trader-web
    github:
      repo: PranjalAgrawal10/Trader
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: 404.html
    catchall_document: index.html
    environment_slug: node-js
    envs:
      # Optional escape hatch only. Default SPA calls are same-origin (/api, /hubs) to avoid CORS preflight OPTIONS.
      # Set VITE_FORCE_CROSS_ORIGIN_API=true only when the API must live on a different origin.
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: ""
