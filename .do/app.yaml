# DigitalOcean App Platform — example spec (edit names, region, repo, sizes).
# Monorepo layout: API from backend/, static site from frontend/.
# Apply: doctl apps update <app-id> --spec .do/app.yaml
# Ingress: /api → .NET service with full path preserved; / → Vite static app.

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

name: trader
region: blr

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: trader
        preserve_path_prefix: true
    - match:
        path:
          prefix: /hubs
      component:
        name: trader
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: trader-web

services:
  - name: trader
    github:
      repo: PranjalAgrawal10/Trader
      branch: main
      deploy_on_push: true
    source_dir: backend
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    # Required RUN_TIME env vars (add in this file or in the DO UI; encrypt secrets):
    # Jwt__Issuer, Jwt__Audience, Jwt__Key (≥32 chars), Cors__Origins__0, Database__Provider,
    # Database__Host, Database__Name, Database__Username, Database__Password (+ optional Port, SslMode)
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        scope: RUN_TIME
        type: GENERAL
        value: Production

static_sites:
  - name: trader-web
    github:
      repo: PranjalAgrawal10/Trader
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: 404.html
    catchall_document: index.html
    environment_slug: node-js
    envs:
      # Optional escape hatch only. Default SPA calls are same-origin (/api, /hubs) to avoid CORS preflight OPTIONS.
      # Set VITE_FORCE_CROSS_ORIGIN_API=true only when the API must live on a different origin.
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: ""
