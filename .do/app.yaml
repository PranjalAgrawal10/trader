# DigitalOcean App Platform — example spec (edit names, region, repo, sizes).
# Monorepo layout: API from backend/, static site from frontend/.
# Apply: doctl apps update <app-id> --spec .do/app.yaml
# Ingress: /api → .NET service with full path preserved; / → Vite static app.

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

name: trader
region: blr

ingress:
  rules:
    - match:
        path:
          prefix: /api
      component:
        name: trader
        preserve_path_prefix: true
    - match:
        path:
          prefix: /
      component:
        name: trader-web

services:
  - name: trader
    github:
      repo: YOUR_GITHUB_USER/Trader
      branch: main
      deploy_on_push: true
    source_dir: backend
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 8080
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        scope: RUN_TIME
        type: GENERAL
        value: Production

static_sites:
  - name: trader-web
    github:
      repo: YOUR_GITHUB_USER/Trader
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    output_dir: dist
    index_document: index.html
    error_document: 404.html
    catchall_document: index.html
    environment_slug: node-js
    envs:
      # Optional if SPA and API share one origin and ingress uses /api → API (client falls back to window.location.origin).
      # Required when the API is on a different origin — set your real HTTPS base (no trailing slash).
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        type: GENERAL
        value: https://YOUR_APP_HOSTNAME.ondigitalocean.app
